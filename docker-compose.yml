services:
  jekyll:
    image: ruby:3.3
    container_name: modern-resume-theme
    command: bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --watch --force_polling --livereload"
    ports:
      - 4000:4000
      - 35729:35729
    volumes:
      - ./:/srv/jekyll
      - bundle-cache:/usr/local/bundle
    working_dir: /srv/jekyll

volumes:
  bundle-cache:
